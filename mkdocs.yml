site_name: mikkoo
site_description: A PgQ to RabbitMQ Relay
site_author: Gavin M. Roy
site_url: https://gmr.github.io/mikkoo/
repo_url: https://github.com/gmr/mikkoo
repo_name: gmr/mikkoo
edit_uri: edit/main/docs/
copyright: Copyright 2014-2026 Gavin M. Roy

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Configuration: configuration.md
  - PgQ Setup: pgq.md
  - History: history.md
